<!DOCTYPE html>
<html>
<head>
    <title>Chat with {{ other_user.username }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .sent {
            background: #e1ffc7;
            align-self: flex-end;
            text-align: right;
        }

        .received {
            background: #f1f0f0;
            align-self: flex-start;
        }

        .chat-footer {
            display: flex;
            border-top: 1px solid #ddd;
        }

        .chat-footer input {
            flex: 1;
            border: none;
            padding: 12px;
            font-size: 16px;
        }

        .chat-footer button {
            background: #007bff;
            border: none;
            color: white;
            padding: 12px 20px;
            cursor: pointer;
        }

        .chat-footer button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Chat with {{ other_user.username }}
    </div>

    <div class="chat-body" id="chat-box">
        {% for msg in messages %}
            <div class="message {% if msg.sender == request.user %}sent{% else %}received{% endif %}">
                <b>{{ msg.sender.username }}:</b> {{ msg.content }}
            </div>
        {% empty %}
          <p class="text-muted">No messages yet. Start the conversation!</p>
        {% endfor %}
    </div>


    <div class="chat-footer">
        <input id="message-input" type="text" placeholder="Type a message..." autocomplete="off" />
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const roomName = "{{ room_name }}";
    const receiver = "{{ other_user.username }}";
    const chatSocket = new WebSocket(
        'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
    );

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // Auto-scroll to bottom
    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    scrollToBottom();

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const div = document.createElement('div');
        div.classList.add('message');
        if (data.sender === "{{ request.user.username }}") {
            div.classList.add('sent');
        } else {
            div.classList.add('received');
        }
        div.innerHTML = `<b>${data.sender}:</b> ${data.message}`;
        chatBox.appendChild(div);
        scrollToBottom();
    };

    sendBtn.onclick = sendMessage;
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
        const message = messageInput.value;
        if (message.trim()) {
            chatSocket.send(JSON.stringify({
                'message': message,
                'receiver': receiver
            }));
            messageInput.value = '';
        }
    }
</script>

</body>
</html>
