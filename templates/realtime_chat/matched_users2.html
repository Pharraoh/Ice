{% load static %}
{% block content %}

<div class="chat-layout">

  <!-- Left Sidebar: Friends List -->
  <div class="friends-sidebar">
    <h4 class="mb-3">Chats</h4>
    <ul id="friends-list">
      {% for friend in matched_users %}
        <li class="friend-item" data-username="{{ friend.username }}" data-room="{{ request.user.username }}_{{ friend.username }}">
          <img src="{{ friend.profile_image.url }}" class="friend-avatar" alt="">
          <div class="friend-info">
            <h6>{{ friend.username|title }}</h6>
            <small>Click to chat</small>
          </div>
        </li>
      {% empty %}
        <li class="text-muted text-center mt-4">No matched users yet</li>
      {% endfor %}
    </ul>
  </div>

  <!-- Right Side: Chat Window -->
  <div class="chat-window">
    <div class="chat-header">
      <div id="chat-user-info" class="d-flex align-items-center">
        <img id="chat-user-avatar" src="" alt="" class="chat-user-avatar">
        <h5 id="chat-username" class="ml-2">Select a user to start chatting</h5>
      </div>
    </div>

    <div id="chat-body" class="chat-body">
      <div id="messages-container" class="messages"></div>
    </div>

    <div class="chat-footer">
      <form id="messageForm">
        <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" required>
        <button id="sendButton" type="submit">Send</button>
      </form>
    </div>
  </div>

</div>

<!-- STYLES -->
<style>
.chat-layout {
  display: flex;
  height: 90vh;
  border: 1px solid #ddd;
  border-radius: 6px;
  overflow: hidden;
}

.friends-sidebar {
  width: 30%;
  border-right: 1px solid #ddd;
  padding: 15px;
  overflow-y: auto;
}

.friend-item {
  display: flex;
  align-items: center;
  padding: 10px;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.3s;
}

.friend-item:hover {
  background: #f5f5f5;
}

.friend-avatar {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 10px;
}

.chat-window {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chat-header {
  padding: 15px;
  border-bottom: 1px solid #ddd;
  display: flex;
  align-items: center;
}

.chat-user-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: none;
}

.chat-body {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  background: #fafafa;
}

.message {
  margin-bottom: 10px;
  padding: 10px 15px;
  border-radius: 12px;
  max-width: 70%;
  clear: both;
}

.message.sent {
  background: #d1f1d1;
  align-self: flex-end;
  float: right;
}

.message.received {
  background: #e9e9e9;
  align-self: flex-start;
  float: left;
}

.chat-footer {
  padding: 10px;
  border-top: 1px solid #ddd;
  display: flex;
}

#messageInput {
  flex: 1;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  outline: none;
}

#sendButton {
  background: #007bff;
  border: none;
  color: #fff;
  padding: 10px 18px;
  border-radius: 6px;
  margin-left: 8px;
  cursor: pointer;
}
</style>

<!-- SCRIPT -->
<script>
let chatSocket = null;
let currentRoom = null;
let currentUser = "{{ request.user.username }}";

// click on friend -> open chat
document.querySelectorAll('.friend-item').forEach(item => {
  item.addEventListener('click', () => {
    const username = item.dataset.username;
    const roomName = [currentUser, username].sort().join('_');

    // update UI
    document.getElementById('chat-username').textContent = username;
    document.getElementById('chat-user-avatar').src = item.querySelector('img').src;
    document.getElementById('chat-user-avatar').style.display = 'inline-block';
    document.getElementById('messages-container').innerHTML = "";

    if (chatSocket) {
      chatSocket.close();  // close previous connection
    }

    // create WebSocket connection
    chatSocket = new WebSocket(
      'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
    );
    currentRoom = roomName;

    chatSocket.onmessage = function(e) {
      const data = JSON.parse(e.data);
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message');
      messageDiv.classList.add(data.sender === currentUser ? 'sent' : 'received');
      messageDiv.textContent = data.message;
      document.getElementById('messages-container').appendChild(messageDiv);
      document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
    };

    chatSocket.onclose = function(e) {
      console.log('Socket closed for', roomName);
    };
  });
});

// send message
document.getElementById('messageForm').onsubmit = function(e) {
  e.preventDefault();
  const messageInput = document.getElementById('messageInput');
  const message = messageInput.value.trim();
  if (message && chatSocket && chatSocket.readyState === WebSocket.OPEN) {
    chatSocket.send(JSON.stringify({
      'message': message,
      'sender': currentUser
    }));
    messageInput.value = '';
  }
};
</script>

{% endblock %}
